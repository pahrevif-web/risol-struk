<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Struk</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .muted { color:#666; font-size:12px; line-height:1.35; }
    .hidden { display:none !important; }

    input, button { width: 100%; box-sizing: border-box; font-size:14px; padding:10px; border-radius:10px; border:1px solid #ccc; }
    button { border: none; cursor: pointer; }
    .btn { background:#111; color:#fff; }
    .btn2 { background:#f2f2f2; }
    .row2 { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    label { display:block; font-size: 12px; color:#444; margin: 10px 0 6px; }

    /* Landing */
    .landing { min-height: 60vh; display:flex; align-items:center; justify-content:center; }
    .landing .box { max-width: 420px; width: 100%; text-align:center; }
    .landing .box h2 { margin: 0 0 8px; font-size: 18px; }
    .landing .box p { margin: 0 0 14px; }

    /* Menu rows */
    .menu-row {
      display:grid; grid-template-columns: 1fr 90px;
      gap:10px; align-items:center; padding:8px 0;
      border-bottom: 1px dashed #ddd;
    }

    /* Receipt */
    #wrap { display:flex; justify-content:center; }
    #receipt {
      width: 80mm; background:#fff; color:#000;
      border: 1px dashed #bbb; border-radius: 10px; padding: 10px;
      font-size: 12px;
    }
    #receipt .center { text-align:center; }
    #receipt .hr { border-top: 1px dashed #000; margin: 8px 0; }
    #receipt table { width:100%; border-collapse:collapse; }
    #receipt td { padding:2px 0; vertical-align:top; }
    #receipt td:nth-child(1){ width:46%; }
    #receipt td:nth-child(2){ width:14%; text-align:right; }
    #receipt td:nth-child(3){ width:20%; text-align:right; }
    #receipt td:nth-child(4){ width:20%; text-align:right; }
    #receipt .tot td:first-child { text-align:left; }
    #receipt .tot td:last-child { text-align:right; }
    #receipt .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    #receipt .qris { display:flex; flex-direction:column; align-items:center; gap:6px; }
    #receipt .qris img { width: 55mm; max-width: 100%; border: 1px solid #eee; border-radius: 8px; }
    #receipt .paynote { font-size:11px; text-align:center; }

    /* Print optional */
    @page { size: 80mm auto; margin: 0; }
    @media print {
      body { margin: 0; }
      .no-print { display:none !important; }
      #wrap { justify-content:flex-start; }
      #receipt { border:none; border-radius:0; padding: 6mm; }
    }
  </style>
</head>
<body>
  <!-- LANDING (hanya New Order) -->
  <div id="landing" class="landing no-print">
    <div class="box card">
      <h2 id="shopTitle"></h2>
      <p class="muted">Tekan <b>Pesan Baru</b> untuk mulai transaksi.</p>
      <button id="btnStart" class="btn" type="button">Pesan Baru</button>
    </div>
  </div>

  <!-- TOOLBAR (muncul setelah New Order ATAU saat buka link struk) -->
  <div id="toolbar" class="card no-print hidden">
    <div class="row2">
      <button id="btnCopy" class="btn">Salin Link Struk</button>
      <button id="btnNew" class="btn2">Pesan Baru</button>
    </div>
    <div style="height:10px"></div>
    <div class="row2">
      <button id="btnMake" class="btn2">Buat Link Struk</button>
      <button id="btnPrint" class="btn2">Print</button>
    </div>
    <div class="muted" style="margin-top:10px;">
      • Link struk ada di URL (<b>#r=...</b>). Link yang dibuka akan tampil read-only.<br>
      • Untuk transaksi baru, klik <b>Pesan Baru</b>.
    </div>
  </div>

  <!-- EDITOR (hanya untuk order baru; disembunyikan saat read-only link) -->
  <div id="editor" class="card no-print hidden">
    <div class="muted">Nama toko: <b id="shopName"></b></div>

    <label>Nama Pembeli</label>
    <input id="buyerName" placeholder="Contoh: Farhan">

    <div class="row2">
      <div>
        <label>Pajak (%)</label>
        <input id="taxRate" type="number" min="0" value="0">
      </div>
      <div>
        <label>Nomor Struk (opsional)</label>
        <input id="receiptNo" placeholder="Auto jika kosong">
      </div>
    </div>

    <label>Menu & Qty</label>
    <div id="menu"></div>

    <div style="height:10px"></div>
    <button id="btnReset" class="btn2" type="button">Reset Qty</button>
  </div>

  <!-- RECEIPT (selalu ada; tapi saat landing belum order, kita tampilkan kosong/placeholder) -->
  <div id="receiptCard" class="card hidden">
    <div id="wrap"><div id="receipt"></div></div>
  </div>

  <script>
    // ====== SETTING ======
    const STORE_NAME = "RISOL IBU KIA";
    const QRIS_IMAGE_URL = "./qris.png"; // upload qris.png sejajar dengan index.html

    const MENU = [
      { id: "M01", name: "Mayo", price: 3000 },
      { id: "M02", name: "Ayam Suwir", price: 3000 },
      { id: "M03", name: "Mentai", price: 3000 },
      { id: "M04", name: "Beef Blackpepper", price: 4000 },
	  { id: "M05", name: "Sosis Bolognese", price: 4000 }
    ];

    // ====== Elements ======
    const elLanding = document.getElementById("landing");
    const elToolbar = document.getElementById("toolbar");
    const elEditor = document.getElementById("editor");
    const elReceiptCard = document.getElementById("receiptCard");
    const elReceipt = document.getElementById("receipt");

    const elShopTitle = document.getElementById("shopTitle");
    const elShopName = document.getElementById("shopName");
    const elBuyer = document.getElementById("buyerName");
    const elTax = document.getElementById("taxRate");
    const elNo = document.getElementById("receiptNo");
    const elMenu = document.getElementById("menu");

    // ====== State ======
    const qty = Object.fromEntries(MENU.map(m => [m.id, 0]));

    // ====== Helpers ======
    const rupiah = n => new Intl.NumberFormat("id-ID").format(n);
    const nowJkt = iso => new Date(iso).toLocaleString("id-ID", { timeZone:"Asia/Jakarta" });
    const safePart = s => String(s||"").trim().replace(/[\\/:*?"<>|]+/g,"-").replace(/\s+/g,"_").slice(0,50);

    function b64urlEncode(str){
      const bytes = new TextEncoder().encode(str);
      let bin = ""; bytes.forEach(b => bin += String.fromCharCode(b));
      return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
    }
    function b64urlDecode(b64url){
      const b64 = b64url.replace(/-/g,"+").replace(/_/g,"/");
      const pad = b64.length % 4 === 0 ? "" : "=".repeat(4 - (b64.length % 4));
      const bin = atob(b64 + pad);
      const bytes = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    async function copy(text){
      try { await navigator.clipboard.writeText(text); alert("Copied ✅"); }
      catch { alert("Gagal copy. Copy manual dari address bar."); }
    }

    function calc(items, taxRate){
      const subtotal = items.reduce((a,b)=>a + b.price*b.qty, 0);
      const tax = Math.round(subtotal * taxRate / 100);
      const total = subtotal + tax;
      return { subtotal, tax, total };
    }

    function renderMenu(){
      elMenu.innerHTML = "";
      MENU.forEach(m=>{
        const row = document.createElement("div");
        row.className = "menu-row";
        row.innerHTML = `
          <div>
            <div><b>${m.name}</b></div>
            <div class="muted">Rp ${rupiah(m.price)}</div>
          </div>
          <div><input data-id="${m.id}" type="number" min="0" value="${qty[m.id]}"></div>
        `;
        elMenu.appendChild(row);
      });

      elMenu.querySelectorAll("input[data-id]").forEach(inp=>{
        inp.addEventListener("input", e=>{
          const id = e.target.getAttribute("data-id");
          const v = Number(e.target.value || 0);
          qty[id] = Number.isFinite(v) && v >= 0 ? v : 0;
          renderReceiptFromEditor();
        });
      });
    }

    function buildReceipt({ buyerName, receiptNo, createdAtISO, items, taxRate }){
      const { subtotal, tax, total } = calc(items, taxRate);

      const rows = items.length
        ? items.map(it => `
            <tr>
              <td>${it.name}</td>
              <td>${it.qty}x</td>
              <td>${rupiah(it.price)}</td>
              <td>${rupiah(it.price*it.qty)}</td>
            </tr>
          `).join("")
        : `<tr><td colspan="4" class="muted">Belum ada item dipilih.</td></tr>`;

      document.title = `Struk_${safePart(buyerName)||"Pembeli"}_${safePart(receiptNo)}`;

      elReceipt.innerHTML = `
        <div class="center">
          <div><b>${STORE_NAME}</b></div>
          <div class="muted" style="font-size:11px">Struk</div>
        </div>

        <div class="hr"></div>

        <div class="mono" style="font-size:11px">
          <div>No: ${receiptNo}</div>
          <div>Tgl: ${nowJkt(createdAtISO)}</div>
          ${buyerName ? `<div>Pembeli: ${buyerName}</div>` : ``}
        </div>

        <div class="hr"></div>

        <table>${rows}</table>

        <div class="hr"></div>

        <table class="tot">
          <tr><td>Subtotal</td><td>Rp ${rupiah(subtotal)}</td></tr>
          <tr><td>Pajak (${taxRate}%)</td><td>Rp ${rupiah(tax)}</td></tr>
          <tr><td><b>Total</b></td><td><b>Rp ${rupiah(total)}</b></td></tr>
        </table>

        <div class="hr"></div>

        <div class="qris">
          <div class="paynote"><b>Bayar via QRIS</b><br>Scan QR berikut, lalu masukkan nominal sesuai <b>Total</b></div>
          <img src="${QRIS_IMAGE_URL}" alt="QRIS" onerror="this.style.display='none'">
          <div class="paynote muted">Nominal: <b>Rp ${rupiah(total)}</b></div>
        </div>

        <div class="hr"></div>
        <div class="center" style="font-size:11px">Terima kasih 🙏</div>
      `;
    }

    function getEditorData(){
      const buyerName = (elBuyer.value || "").trim();
      const taxRate = Number(elTax.value || 0);
      const receiptNo = (elNo.value || "").trim() || ("RSL-" + Date.now());
      const createdAtISO = new Date().toISOString();
      const items = MENU
        .map(m => ({ name:m.name, price:m.price, qty:Number(qty[m.id]||0) }))
        .filter(it => it.qty > 0);
      return { buyerName, taxRate, receiptNo, createdAtISO, items };
    }

    function renderReceiptFromEditor(){
      buildReceipt(getEditorData());
    }

    function makeLinkFromEditor(){
      const payload = { v:1, ...getEditorData() };
      location.hash = "r=" + b64urlEncode(JSON.stringify(payload));
    }

    function parseLink(){
      const h = (location.hash || "").replace(/^#/, "");
      const m = h.match(/(?:^|&)r=([^&]+)/);
      if (!m) return null;
      try { return JSON.parse(b64urlDecode(m[1])); } catch { return null; }
    }

    // ====== UI Modes ======
    function showLanding(){
      elLanding.classList.remove("hidden");
      elToolbar.classList.add("hidden");
      elEditor.classList.add("hidden");
      elReceiptCard.classList.add("hidden");
    }

    function showEditor(){
      elLanding.classList.add("hidden");
      elToolbar.classList.remove("hidden");
      elEditor.classList.remove("hidden");
      elReceiptCard.classList.remove("hidden");
      renderReceiptFromEditor();
    }

    function showReadOnly(payload){
      elLanding.classList.add("hidden");
      elToolbar.classList.remove("hidden");
      elEditor.classList.add("hidden"); // read-only: no editor
      elReceiptCard.classList.remove("hidden");

      const items = Array.isArray(payload.items) ? payload.items : [];
      buildReceipt({
        buyerName: (payload.buyerName||"").trim(),
        taxRate: Number(payload.taxRate || 0),
        receiptNo: payload.receiptNo || ("RSL-" + Date.now()),
        createdAtISO: payload.createdAtISO || new Date().toISOString(),
        items
      });
    }

    function newOrder(){
      // clear hash
      history.pushState("", document.title, location.pathname + location.search);

      // reset form
      elBuyer.value = "";
      elTax.value = "0";
      elNo.value = "";
      Object.keys(qty).forEach(k => qty[k] = 0);
      renderMenu();

      showEditor();
    }

    // ====== Actions ======
    document.getElementById("btnStart").addEventListener("click", newOrder);
    document.getElementById("btnNew").addEventListener("click", newOrder);

    document.getElementById("btnMake").addEventListener("click", ()=>{
      makeLinkFromEditor();
      copy(location.href);
    });

    document.getElementById("btnCopy").addEventListener("click", ()=>copy(location.href));
    document.getElementById("btnPrint").addEventListener("click", ()=>window.print());

    document.getElementById("btnReset").addEventListener("click", ()=>{
      Object.keys(qty).forEach(k=>qty[k]=0);
      elNo.value = "";
      renderMenu();
      renderReceiptFromEditor();
    });

    // live preview (editor)
    elBuyer.addEventListener("input", renderReceiptFromEditor);
    elTax.addEventListener("input", renderReceiptFromEditor);
    elNo.addEventListener("input", renderReceiptFromEditor);

    window.addEventListener("hashchange", ()=>{
      const p = parseLink();
      if (p) showReadOnly(p);
      else showLanding(); // tanpa hash, balik landing (hanya New Order)
    });

    // ====== INIT ======
    elShopTitle.textContent = STORE_NAME;
    elShopName.textContent = STORE_NAME;
    renderMenu();

    const initial = parseLink();
    if (initial) {
      showReadOnly(initial);
    } else {
      // awal buka: hanya New Order
      showLanding();
    }
  </script>
</body>
</html>
